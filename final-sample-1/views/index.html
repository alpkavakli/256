<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/assets/css/app.css">
    <style>
        .srcInput{
            display:flex;
            justify-content: center;
            margin-top: 1%;
        }

        #loading {
            width: 60px;
            display: none; /* app.js shows it during loading */
            position: fixed; /* bottom-center, always visible */
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="srcInput">
    <form action="POST" id="search">
        <input type="text" id="search-input" placeholder="search tag..">

    </form>
    </div>

    <!-- search tag chips (filled by app.js) -->
    <div id="tags" class="center"></div>

    <table id="thetable">
        <thead id="thead">
        <tr>
            <th>Team</th>
            <th>Project Name</th>
            <th>Supervisor</th>
            <th>Tags</th>
            <th>Like</th>
        </tr>
       </thead>
       <tbody>
      
        </tbody>
    </table>

    <img src="/assets/img/loader.gif" id="loading">

    <script src="/assets/js/app.js"></script>
</body>
</html>
